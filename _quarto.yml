project:
  type: book
  output-dir: docs

book:
  title: "DI32011"
  author: "Thomas Winyard"
  date: "03/03/2026"
  repo-url: https://github.com/PlanarSkyrmion/DI32011/
  downloads: pdf
  repo-actions: [issue]
  cover-image: DI32011Cover.png


  
  chapters:
    - index.qmd
    - part: "Discrete time"
      chapters: 
        - part1/DiscreteTimeOnePop.qmd
        - part1/DiscreteTimeTwoPop.qmd
    - part: "Continuous time"
      chapters:
        - part2/CtsTimeOnePop.qmd
        - part2/CtsTimeMultiPop.qmd  
        - part2/Biochemicalkinetics.qmd

    - part: "Appendices"
      chapters:
        - appendix/PythonAppendix.qmd    
        - appendix/CurveSketching.qmd
      
bibliography: references.bib

format:
  html:
    theme: cosmo
    code-fold: true
  pdf:
    documentclass: scrreprt
    echo: false
    include-in-header:
      - text: |
          \usepackage{chemarr}
          \usepackage{lipsum}
          \usepackage{tikz}
          \AtBeginDocument{\thispagestyle{empty}
          \begin{tikzpicture}[remember picture,overlay]
          \node at (current page.center) {\includegraphics[width=\paperwidth,height=\paperheight,keepaspectratio]{MA32009Cover.png}};
          \end{tikzpicture}\clearpage}
filters:
  - shinylive
  
execute:
  warning: false
     


  



